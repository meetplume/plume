name: Sync docs to meetplume.com

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs-guide/**'
      - 'docs-contributing/**'
      - 'playground/app/Plume/DocsGuideVault.php'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plume (source)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout meetplume.com (target)
        uses: actions/checkout@v5
        with:
          repository: meetplume/meetplume.com
          ssh-key: ${{ secrets.DOCS_DEPLOY_KEY }}
          path: target

      - name: Replace docs folders
        run: |
          for d in docs-guide docs-contributing; do
            dest="target/content/$d"
            echo "Replacing $dest with contents of $d"
            rm -rf "$dest"
            mkdir -p "$(dirname "$dest")"
            cp -a "$d" "$dest"
          done

      - name: Replace DocsGuideVault.php with playground version
        run: |
          src="playground/app/Plume/DocsGuideVault.php"
          dest="target/app/Plume/DocsGuideVault.php"
          echo "Replacing $dest with $src"
          mkdir -p "$(dirname "$dest")"
          cp -a "$src" "$dest"

      - name: Commit, push and deploy meetplume.com
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to push."
            exit 0
          fi
          git commit -m "Sync docs from plume@${GITHUB_SHA::7}"
          git push
          curl -fsS -o /dev/null -X POST "$DEPLOY_WEBHOOK_URL"
